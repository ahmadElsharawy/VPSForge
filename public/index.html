<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Port Forward Manager</title>
    <style>
      :root { color-scheme: dark; --bg:#07111f; --panel:#0f172a; --border:#263449; --text:#f8fafc; --muted:#94a3b8; --accent:#38bdf8; --green:#22c55e; --red:#ef4444; --amber:#f59e0b; }
      *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,sans-serif;} .shell{display:grid;grid-template-columns:280px 1fr;min-height:100vh;} .sidebar{background:#020617;padding:24px;border-right:1px solid var(--border);} .sidebar h1{font-size:1.05rem;margin:0 0 18px;} .sidebar a{display:block;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;margin-bottom:8px;} .sidebar a.active{background:var(--panel);color:var(--text);} .content{padding:24px;} .cards{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:16px;margin-bottom:20px;} .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;} .card .label{font-size:.8rem;color:var(--muted);} .card .value{font-size:1.5rem;font-weight:700;margin-top:8px;} .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;} .toolbar .controls{display:flex;gap:10px;flex-wrap:wrap;} input,select,button{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#111827;color:var(--text);} button{cursor:pointer;background:var(--accent);border:none;font-weight:600;} table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;} th,td{padding:12px 14px;border-bottom:1px solid var(--border);text-align:left;} .badge{display:inline-block;padding:5px 8px;border-radius:999px;font-size:.75rem;font-weight:700;} .badge.active{background:rgba(34,197,85,.2);color:#86efac;} .badge.disabled{background:rgba(239,68,68,.2);color:#fda4af;} .badge.tcp{background:rgba(56,189,248,.2);color:#7dd3fc;} .badge.udp{background:rgba(249,115,22,.2);color:#fdba74;} .badge.both{background:rgba(168,85,247,.2);color:#d8b4fe;} .muted{color:var(--muted);} @media (max-width: 980px){.shell{grid-template-columns:1fr;}.sidebar{border-right:none;border-bottom:1px solid var(--border);}} 
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <h1>CtrlVPS</h1>
        <a href="#">Dashboard</a>
        <a class="active" href="#">Network</a>
        <a href="#">Port Forward</a>
      </aside>
      <main class="content">
        <div class="cards">
          <div class="card"><div class="label">Total Rules</div><div class="value" id="totalRules">0</div></div>
          <div class="card"><div class="label">Active Rules</div><div class="value" id="activeRules">0</div></div>
          <div class="card"><div class="label">TCP Rules</div><div class="value" id="tcpRules">0</div></div>
          <div class="card"><div class="label">UDP Rules</div><div class="value" id="udpRules">0</div></div>
        </div>
        <div class="toolbar">
          <div class="controls">
            <input id="searchInput" placeholder="Search" />
            <select id="protocolFilter"><option value="all">All Protocols</option><option value="TCP">TCP</option><option value="UDP">UDP</option><option value="BOTH">BOTH</option></select>
            <select id="statusFilter"><option value="all">All Status</option><option value="active">Active</option><option value="disabled">Disabled</option></select>
          </div>
          <div class="controls">
            <button id="refreshBtn">Refresh</button>
            <button id="addBtn">Add Rule</button>
          </div>
        </div>
        <table>
          <thead>
            <tr><th>Status</th><th>Protocol</th><th>External Port</th><th>Internal IP</th><th>Internal Port</th><th>Description</th><th>Packets</th><th>Bytes</th><th>Created</th><th>Actions</th></tr>
          </thead>
          <tbody id="rulesBody"></tbody>
        </table>
      </main>
    </div>
    <script>
      const state = { rules: [] };
      const body = document.getElementById('rulesBody');
      const searchInput = document.getElementById('searchInput');
      const protocolFilter = document.getElementById('protocolFilter');
      const statusFilter = document.getElementById('statusFilter');
      async function loadRules() {
        const res = await fetch('/api/port-forwards');
        const json = await res.json();
        state.rules = json.data || [];
        render();
      }
      function render() {
        const query = searchInput.value.toLowerCase();
        const filtered = state.rules.filter((rule) => {
          const matchesQuery = [rule.description, rule.internalIp, String(rule.externalPort)].join(' ').toLowerCase().includes(query);
          const matchesProtocol = protocolFilter.value === 'all' || rule.protocol === protocolFilter.value;
          const matchesStatus = statusFilter.value === 'all' || rule.status === statusFilter.value;
          return matchesQuery && matchesProtocol && matchesStatus;
        });
        document.getElementById('totalRules').textContent = state.rules.length;
        document.getElementById('activeRules').textContent = state.rules.filter((r) => r.status === 'active').length;
        document.getElementById('tcpRules').textContent = state.rules.filter((r) => r.protocol === 'TCP' || r.protocol === 'BOTH').length;
        document.getElementById('udpRules').textContent = state.rules.filter((r) => r.protocol === 'UDP' || r.protocol === 'BOTH').length;
        body.innerHTML = filtered.map((rule) => `
          <tr>
            <td><span class="badge ${rule.status}">${rule.status}</span></td>
            <td><span class="badge ${rule.protocol.toLowerCase()}">${rule.protocol}</span></td>
            <td>${rule.externalIp || '0.0.0.0'}:${rule.externalPort}</td>
            <td>${rule.internalIp}</td>
            <td>${rule.internalPort}</td>
            <td>${rule.description}</td>
            <td>${rule.packets}</td>
            <td>${rule.bytes}</td>
            <td>${new Date(rule.createdAt).toLocaleString()}</td>
            <td>
              <button data-action="toggle" data-id="${rule.id}">${rule.status === 'active' ? 'Disable' : 'Enable'}</button>
            </td>
          </tr>
        `).join('');
      }
      document.getElementById('refreshBtn').addEventListener('click', loadRules);
      document.getElementById('addBtn').addEventListener('click', async () => {
        const protocol = prompt('Protocol (TCP/UDP/BOTH):', 'TCP');
        const externalIp = prompt('External IP (leave empty for all interfaces):', '82.70.227.80');
        const externalPort = Number(prompt('External Port:', '8081'));
        const internalIp = prompt('Internal IP:', '10.238.8.12');
        const internalPort = Number(prompt('Internal Port:', '8080'));
        const description = prompt('Description:', 'Service port forward');
        const enableImmediately = confirm('Enable immediately?');
        const res = await fetch('/api/port-forwards', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ protocol, externalIp: externalIp || undefined, externalPort, internalIp, internalPort, description, enableImmediately })});
        const json = await res.json();
        alert(json.success ? 'Rule created' : json.error);
        loadRules();
      });
      body.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const id = button.getAttribute('data-id');
        const res = await fetch(`/api/port-forwards/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status: button.textContent === 'Disable' ? 'disabled' : 'active' })});
        const json = await res.json();
        alert(json.success ? 'Updated' : json.error);
        loadRules();
      });
      [searchInput, protocolFilter, statusFilter].forEach((el) => el.addEventListener('input', render));
      loadRules();
      setInterval(loadRules, 5000);
    </script>
  </body>
</html>
